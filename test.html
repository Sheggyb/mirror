<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Deep Test</title></head>
<body style="background:#000;color:#fff;font-family:monospace;padding:20px;font-size:13px;">
<h1>Deep Inspection</h1>
<div id="out"></div>
<script>
const out = document.getElementById('out');
const md = navigator.mediaDevices;

let html = '';

// Inspect prototype chain
let obj = md;
let depth = 0;
while (obj && depth < 5) {
  const proto = Object.getPrototypeOf(obj);
  if (!proto) break;

  // Get ALL properties (not just enumerable)
  const allProps = Object.getOwnPropertyNames(proto);
  html += 'Proto level ' + depth + ' own props: ' + JSON.stringify(allProps) + '<br>';

  // Check each for getDisplayMedia
  for (const prop of allProps) {
    const desc = Object.getOwnPropertyDescriptor(proto, prop);
    if (prop.toLowerCase().includes('display') || prop.toLowerCase().includes('screen') || prop.toLowerCase().includes('capture')) {
      html += '  <b style="color:yellow">FOUND: ' + prop + ' — getter=' + (!!desc.get) + ' value=' + (typeof desc.value) + '</b><br>';
    }
  }

  obj = proto;
  depth++;
}

// Try MediaDevices constructor
html += '<br>MediaDevices global: ' + (typeof MediaDevices) + '<br>';
if (typeof MediaDevices !== 'undefined') {
  html += 'MediaDevices.prototype props: ' + JSON.stringify(Object.getOwnPropertyNames(MediaDevices.prototype)) + '<br>';
}

// Try direct check with hasOwnProperty via prototype
const proto = Object.getPrototypeOf(md);
html += '<br>getDisplayMedia via proto: ' + (proto.getDisplayMedia ? 'YES' : 'NO') + '<br>';
html += 'getDisplayMedia descriptor: ' + JSON.stringify(Object.getOwnPropertyDescriptor(proto, 'getDisplayMedia')) + '<br>';

// Check if maybe it's on navigator directly?
html += '<br>navigator.getDisplayMedia: ' + (navigator.getDisplayMedia ? 'YES' : 'NO') + '<br>';

// Check if it requires user activation
html += 'navigator.userActivation: ' + JSON.stringify(navigator.userActivation) + '<br>';

out.innerHTML = html;
</script>
</body></html>
