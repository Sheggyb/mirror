<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f; display: flex; align-items: center;
    justify-content: center; height: 100vh; height: 100dvh;
    font-family: 'Courier New', monospace; overflow: hidden;
    touch-action: none; user-select: none;
  }
  .wrap { text-align: center; }
  .score {
    color: #3a3a4a; font-size: min(2vw, 0.85rem); letter-spacing: 4px;
    text-transform: uppercase; margin-bottom: 12px;
  }
  .score span { color: #6ee7b7; font-size: min(3vw, 1.3rem); }
  canvas {
    border: 1px solid #1a1a2e; border-radius: 4px;
    display: block; margin: 0 auto;
  }
  .controls {
    display: grid; margin-top: 16px;
    grid-template-areas: '. up .' 'left . right' '. down .';
    grid-template-columns: repeat(3, min(12vw, 80px));
    grid-template-rows: repeat(3, min(12vw, 80px)); gap: 6px;
    justify-content: center;
  }
  .ctrl {
    background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px;
    font-size: min(5vw, 2rem); color: #6ee7b7; display: flex;
    align-items: center; justify-content: center; cursor: pointer;
    -webkit-tap-highlight-color: transparent; min-width: 48px; min-height: 48px;
  }
  .ctrl:active, .ctrl:focus { background: #2a2a4a; }
  .up { grid-area: up; } .down { grid-area: down; }
  .left { grid-area: left; } .right { grid-area: right; }

  .gameover {
    display: none; color: #6ee7b7; font-size: min(3vw, 1.3rem); margin-top: 16px;
    letter-spacing: 3px;
  }
  .gameover button {
    display: block; margin: 14px auto 0; padding: min(2vh, 14px) min(6vw, 36px);
    background: #6ee7b7; color: #0a0a0f; border: none; border-radius: 8px;
    font-size: min(2.5vw, 1rem); font-weight: 700; letter-spacing: 2px;
    cursor: pointer; text-transform: uppercase;
  }

  .hint {
    color: #2a2a4a; font-size: min(1.5vw, 0.7rem); margin-top: 10px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="score">Score <span id="scoreVal">0</span></div>
  <canvas id="c"></canvas>
  <div class="controls">
    <div class="ctrl up" data-dir="up">▲</div>
    <div class="ctrl left" data-dir="left">◀</div>
    <div class="ctrl right" data-dir="right">▶</div>
    <div class="ctrl down" data-dir="down">▼</div>
  </div>
  <p class="hint">or use remote arrow keys</p>
  <div class="gameover" id="go">
    Game Over
    <button id="restart">Play Again</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('scoreVal');
const goDiv = document.getElementById('go');

// Size: fit nicely on screen
const maxW = window.innerWidth - 24;
const maxH = window.innerHeight - 280;
const SIZE = Math.min(maxW, maxH, 500);
const GRID = 20;
const CELL = SIZE / GRID;
canvas.width = SIZE; canvas.height = SIZE;

let snake, food, dir, nextDir, score, speed, loop;

function init() {
  snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
  dir = { x: 1, y: 0 }; nextDir = { x: 1, y: 0 };
  score = 0; speed = 100;
  scoreEl.textContent = '0';
  goDiv.style.display = 'none';
  placeFood();
  if (loop) clearInterval(loop);
  loop = setInterval(tick, speed);
}

function placeFood() {
  do {
    food = { x: Math.floor(Math.random() * GRID), y: Math.floor(Math.random() * GRID) };
  } while (snake.some(s => s.x === food.x && s.y === food.y));
}

function tick() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    clearInterval(loop);
    goDiv.style.display = 'block';
    return;
  }

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10; scoreEl.textContent = score;
    placeFood();
    if (speed > 50) { clearInterval(loop); speed -= 2; loop = setInterval(tick, speed); }
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0, 0, SIZE, SIZE);
  ctx.strokeStyle = '#111122'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, SIZE); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(SIZE, i * CELL); ctx.stroke();
  }
  ctx.fillStyle = '#f87171'; ctx.shadowColor = '#f87171'; ctx.shadowBlur = 8;
  ctx.fillRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4);
  ctx.shadowBlur = 0;
  snake.forEach((s, i) => {
    const alpha = 1 - (i / (snake.length + 10)) * 0.5;
    ctx.fillStyle = i === 0 ? '#6ee7b7' : `rgba(110,231,183,${alpha})`;
    ctx.fillRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2);
  });
}

function changeDir(d) {
  if (d === 'up' && dir.y !== 1) nextDir = { x: 0, y: -1 };
  if (d === 'down' && dir.y !== -1) nextDir = { x: 0, y: 1 };
  if (d === 'left' && dir.x !== 1) nextDir = { x: -1, y: 0 };
  if (d === 'right' && dir.x !== -1) nextDir = { x: 1, y: 0 };
}

document.addEventListener('keydown', e => {
  const map = { ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',w:'up',s:'down',a:'left',d:'right' };
  const d = map[e.key]; if (d) changeDir(d);
});

document.querySelectorAll('.ctrl').forEach(btn => {
  btn.addEventListener('click', () => changeDir(btn.dataset.dir));
});

// Swipe for phones
let tx, ty;
canvas.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; });
canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy)) {
    changeDir(dx > 30 ? 'right' : dx < -30 ? 'left' : null);
  } else {
    changeDir(dy > 30 ? 'down' : dy < -30 ? 'up' : null);
  }
});

document.getElementById('restart').addEventListener('click', init);

init();
draw();
</script>
</body>
</html>
