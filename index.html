<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Screen Mirror</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #111;
    color: #eee;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .hidden { display: none !important; }

  /* ─── RECEIVER (TV) — full screen QR ───────────────────────── */
  #receiverView {
    width: 100%;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
    padding: 5vh 5vw;
  }
  #receiverView .qr-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  #receiverView .qr-wrapper img {
    max-width: 90vw;
    max-height: 70vh;
    width: auto;
    height: auto;
    border-radius: 8px;
    background: #fff;
    padding: 3vw;
  }
  #receiverView .bottom-bar {
    color: #555;
    font-size: min(3vw, 1.2rem);
    text-align: center;
    padding: 2vh 0;
  }
  #receiverView .bottom-bar.connected { color: #4ade80; }

  /* ─── SHARER (iPhone) — big tap button ─────────────────────── */
  #sharerView {
    width: 100%;
    max-width: 400px;
    padding: 24px;
    text-align: center;
  }
  #sharerView h1 {
    font-size: 1.5rem;
    margin-bottom: 8px;
  }
  #sharerView .sub {
    color: #999;
    font-size: 0.85rem;
    margin-bottom: 32px;
  }
  #sharerView .big-btn {
    display: block;
    width: 100%;
    padding: 24px;
    border: none;
    border-radius: 16px;
    font-size: 1.3rem;
    font-weight: 700;
    cursor: pointer;
    background: #4f46e5;
    color: #fff;
    margin-bottom: 16px;
  }
  #sharerView .big-btn:active { opacity: 0.7; }
  #sharerView .big-btn.stop { background: #dc2626; }
  #sharerView .status {
    font-size: 0.9rem;
    color: #bbb;
    margin-top: 12px;
  }
  #sharerView .status.error { color: #f87171; }
  #sharerView .status.ok { color: #4ade80; }

  .unsupported-box {
    background: #1a1a2e;
    border-radius: 12px;
    padding: 24px;
    margin-top: 16px;
    text-align: left;
    line-height: 1.7;
    font-size: 0.9rem;
  }
  .unsupported-box p { color: #ccc; }
  .unsupported-box strong { color: #f87171; }

  /* Video overlay */
  #videoOverlay {
    position: fixed;
    inset: 0;
    background: #000;
    display: none;
    z-index: 100;
  }
  #videoOverlay video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
</style>
</head>
<body>

<!-- ═══ RECEIVER VIEW (TV) ═══ -->
<div id="receiverView" class="hidden">
  <div class="qr-wrapper" id="qrWrapper">
    <div style="color:#333;font-size:min(4vw,1.5rem);">Setting up...</div>
  </div>
  <div class="bottom-bar" id="receiverMsg">Scan with your iPhone camera</div>
</div>

<!-- ═══ SHARER VIEW (iPhone) ═══ -->
<div id="sharerView" class="hidden">
  <h1>📱 Screen Mirror</h1>
  <p class="sub">About to share to your TV</p>
  <button class="big-btn" id="shareBtn">📤 Share Screen</button>
  <div class="status" id="shareMsg"></div>
</div>

<!-- ═══ Video ═══ -->
<div id="videoOverlay">
  <video id="remoteVideo" autoplay playsinline style="width:100%;height:100%;object-fit:contain;"></video>
</div>

<script>
// ─── STUN ──────────────────────────────────────────────────────
const ice = { iceServers: [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' }
]};

// ─── DOM ───────────────────────────────────────────────────────
const receiverView = document.getElementById('receiverView');
const sharerView   = document.getElementById('sharerView');
const qrWrapper    = document.getElementById('qrWrapper');
const receiverMsg  = document.getElementById('receiverMsg');
const shareBtn     = document.getElementById('shareBtn');
const shareMsg     = document.getElementById('shareMsg');
const videoOverlay = document.getElementById('videoOverlay');
const remoteVideo  = document.getElementById('remoteVideo');

let pc = null, localStream = null, receiverCandidates = [];
let connectionData = null; // stored from URL hash

// ─── Detect mode ───────────────────────────────────────────────
const hash = window.location.hash;
if (hash && hash.startsWith('#connect=')) {
  // Phone: parse connection data from QR
  try {
    connectionData = JSON.parse(atob(decodeURIComponent(hash.slice(9))));
  } catch {
    try { connectionData = JSON.parse(atob(hash.slice(9))); } catch {}
  }
}

// ─── Encode / decode ───────────────────────────────────────────
function encodeConnection(offer, candidates) {
  return btoa(JSON.stringify({
    type: offer.type,
    sdp: offer.sdp,
    candidates: candidates.map(c => ({
      candidate: c.candidate,
      sdpMid: c.sdpMid,
      sdpMLineIndex: c.sdpMLineIndex
    }))
  }));
}

// ─── Feature check ─────────────────────────────────────────────
function supportsScreenCapture() {
  return !!(navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia);
}

// ═══════════════════════════════════════════════════════════════
// RECEIVER (TV)
// ═══════════════════════════════════════════════════════════════
async function runReceiver() {
  receiverView.classList.remove('hidden');
  sharerView.classList.add('hidden');

  receiverCandidates = [];

  pc = new RTCPeerConnection(ice);

  pc.onicecandidate = e => {
    if (e.candidate) receiverCandidates.push(e.candidate);
  };

  pc.ontrack = event => {
    remoteVideo.srcObject = event.streams[0];
    receiverMsg.textContent = '✅ Connected!';
    receiverMsg.className = 'bottom-bar connected';
    qrWrapper.innerHTML = '<div style="color:#4ade80;font-size:min(6vw,2rem);">✅ Connected</div>';
    videoOverlay.style.display = 'block';
  };

  pc.oniceconnectionstatechange = () => {
    const s = pc.iceConnectionState;
    if (s === 'connected' || s === 'completed') {
      receiverMsg.textContent = '✅ Connected!';
      receiverMsg.className = 'bottom-bar connected';
    } else if (s === 'disconnected' || s === 'failed') {
      receiverMsg.textContent = '⚠ Lost — refresh page';
      receiverMsg.className = 'bottom-bar';
    }
  };

  try {
    pc.createDataChannel('mirror');
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    // Let ICE gather
    await new Promise(r => setTimeout(r, 2500));

    const code = encodeConnection(offer, receiverCandidates);
    const base = window.location.href.split('#')[0].split('?')[0];
    const connectUrl = base + '#connect=' + encodeURIComponent(code);

    // QR code — use larger size for TV
    const img = document.createElement('img');
    img.alt = 'Scan QR code';
    img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=500x500&margin=10&data='
            + encodeURIComponent(connectUrl);

    img.onerror = () => {
      qrWrapper.innerHTML = `
        <div style="color:#999;font-size:min(4vw,1.5rem);text-align:center;line-height:1.8;">
          QR failed to load.<br>
          <span style="font-size:min(3vw,1rem);word-break:break-all;color:#555;">
            ${connectUrl.length > 80 ? connectUrl.slice(0, 80) + '…' : connectUrl}
          </span>
        </div>`;
    };

    qrWrapper.innerHTML = '';
    qrWrapper.appendChild(img);
    receiverMsg.textContent = 'Scan with your iPhone camera';

    // Auto-refresh after 2 min
    setTimeout(() => {
      if (pc && pc.iceConnectionState === 'new') {
        pc.close();
        runReceiver();
      }
    }, 120000);

  } catch (err) {
    qrWrapper.innerHTML = '<div style="color:#f87171;font-size:min(4vw,1.5rem);">Error: ' + err.message + '</div>';
  }
}

// ═══════════════════════════════════════════════════════════════
// SHARER (iPhone)
// ═══════════════════════════════════════════════════════════════
function runSharer() {
  sharerView.classList.remove('hidden');
  receiverView.classList.add('hidden');

  if (!connectionData) {
    sharerView.innerHTML = `
      <h1>❌ No connection data</h1>
      <p class="sub">Scan the QR code on the TV again</p>
    `;
    return;
  }

  // Check browser support
  if (!supportsScreenCapture()) {
    // Show unsupported message with details
    shareBtn.classList.add('hidden');
    shareMsg.textContent = 'Your browser doesn\'t support screen sharing';
    shareMsg.className = 'status error';

    const ua = navigator.userAgent;
    const isIOS = /iPhone|iPad|iPod/.test(ua);
    const isSafari = /Safari/.test(ua) && !/CriOS|FxiOS|OPiOS/.test(ua);

    let help = '';
    if (isIOS) {
      help = `
        <div class="unsupported-box">
          <p><strong>iOS limitation:</strong></p>
          <p style="margin-top:8px;">Screen sharing from a webpage requires <strong>iOS 16.4+</strong> and must be opened in <strong>Safari</strong> — not from the Camera app preview.</p>
          <p style="margin-top:8px;">Try this instead:</p>
          <ol style="margin:8px 0 0 18px;color:#ccc;">
            <li>Take a <strong>screenshot</strong> of the QR code on the TV</li>
            <li>Open the photo, <strong>long-press</strong> the QR code</li>
            <li>Tap <strong>"Open in Safari"</strong></li>
          </ol>
          <p style="margin-top:12px;font-size:0.8rem;color:#666;">
            iOS ${(/OS (\d+_\d+)/.exec(ua)||['','?'])[1].replace('_','.')}
            ${isSafari ? '| Safari ✅' : '| Browser: ' + (ua.includes('CriOS')?'Chrome':'other')}
          </p>
        </div>
      `;
    }

    sharerView.insertAdjacentHTML('beforeend', help);
    return;
  }

  shareBtn.addEventListener('click', async function startShare() {
    shareBtn.textContent = '⏳ Requesting permission...';
    shareBtn.disabled = true;

    try {
      localStream = await navigator.mediaDevices.getDisplayMedia({
        video: { frameRate: { ideal: 15 } },
        audio: false
      });

      shareBtn.textContent = '⏳ Connecting to TV...';
      shareMsg.textContent = '';
      shareMsg.className = 'status';

      pc = new RTCPeerConnection(ice);

      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

      // Add receiver ICE candidates
      if (connectionData.candidates) {
        for (const c of connectionData.candidates) {
          if (c.candidate) {
            try { await pc.addIceCandidate(new RTCIceCandidate(c)); }
            catch {}
          }
        }
      }

      await pc.setRemoteDescription({
        type: connectionData.type,
        sdp: connectionData.sdp
      });

      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);

      shareBtn.textContent = '⏹ Stop Sharing';
      shareBtn.className = 'big-btn stop';
      shareBtn.disabled = false;

      shareBtn.onclick = () => {
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
        if (pc) { pc.close(); pc = null; }
        shareBtn.textContent = '📤 Share Screen';
        shareBtn.className = 'big-btn';
        shareBtn.disabled = false;
        shareMsg.textContent = 'Stopped';
        shareMsg.className = 'status';
        shareBtn.onclick = startShare;
      };

      localStream.getVideoTracks()[0].onended = () => {
        shareBtn.textContent = '📤 Share Screen';
        shareBtn.className = 'big-btn';
        shareBtn.disabled = false;
        shareMsg.textContent = 'Sharing stopped by system';
        shareMsg.className = 'status';
      };

      shareMsg.textContent = '✅ Connected!';
      shareMsg.className = 'status ok';

      pc.oniceconnectionstatechange = () => {
        if (pc.iceConnectionState === 'failed') {
          shareMsg.textContent = '⚠ Connection lost';
          shareMsg.className = 'status error';
        }
      };

    } catch (err) {
      shareBtn.textContent = '📤 Share Screen';
      shareBtn.className = 'big-btn';
      shareBtn.disabled = false;
      shareBtn.onclick = startShare;

      if (err.name === 'NotAllowedError') {
        shareMsg.textContent = 'Permission denied — try again';
      } else if (err.name === 'AbortError') {
        shareMsg.textContent = 'Cancelled';
      } else {
        shareMsg.textContent = 'Error: ' + err.message;
      }
      shareMsg.className = 'status error';
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// GO
// ═══════════════════════════════════════════════════════════════
if (connectionData) {
  runSharer();
} else {
  runReceiver();
}
</script>
</body>
</html>
