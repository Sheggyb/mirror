<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Screen Mirror</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #000;
    color: #fff;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hidden { display: none !important; }

  /* ─── TV view: full-screen code ──────────────────── */
  #tvView {
    text-align: center;
    padding: 5vh 5vw;
    width: 100%;
  }
  #tvView .room-word {
    font-size: min(22vw, 14rem);
    font-weight: 900;
    letter-spacing: 0.15em;
    color: #4f46e5;
    line-height: 1;
  }
  #tvView .room-hint {
    font-size: min(4vw, 1.5rem);
    color: #555;
    margin-top: 3vh;
  }
  #tvView .tv-status {
    font-size: min(3vw, 1.2rem);
    color: #555;
    margin-top: 3vh;
  }
  #tvView .tv-status.ok { color: #4ade80; }
  #tvView .tv-status.error { color: #f87171; }

  /* ─── Phone view: input + buttons ────────────────── */
  #phoneView {
    width: 100%;
    max-width: 400px;
    padding: 24px;
    text-align: center;
  }
  #phoneView h1 { font-size: 1.5rem; margin-bottom: 4px; }
  #phoneView .sub { color: #999; font-size: 0.85rem; margin-bottom: 24px; }

  #phoneView .code-input {
    width: 100%;
    padding: 18px;
    background: #1a1a2e;
    border: 2px solid #333;
    border-radius: 14px;
    color: #fff;
    font-size: 1.6rem;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-weight: 700;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    outline: none;
    margin-bottom: 16px;
  }
  #phoneView .code-input:focus { border-color: #4f46e5; }

  #phoneView .big-btn {
    display: block;
    width: 100%;
    padding: 20px;
    border: none;
    border-radius: 14px;
    font-size: 1.2rem;
    font-weight: 700;
    cursor: pointer;
    color: #fff;
  }
  #phoneView .big-btn:active { opacity: 0.7; }
  #phoneView .big-btn:disabled { opacity: 0.4; }
  #phoneView .big-btn.connect { background: #4f46e5; }
  #phoneView .big-btn.share { background: #059669; }
  #phoneView .big-btn.stop { background: #dc2626; }
  #phoneView .big-btn.refresh { background: #333; font-size: 0.9rem; padding: 14px; margin-top: 8px; }

  #phoneView .phone-status {
    font-size: 0.9rem;
    color: #bbb;
    margin-top: 14px;
    min-height: 1.2em;
  }
  #phoneView .phone-status.error { color: #f87171; }
  #phoneView .phone-status.ok { color: #4ade80; }

  /* Video overlay */
  #videoOverlay {
    position: fixed;
    inset: 0;
    background: #000;
    display: none;
    z-index: 100;
  }
  #videoOverlay video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
</style>
</head>
<body>

<!-- ═══ TV VIEW ═══ -->
<div id="tvView" class="hidden">
  <div class="room-word" id="roomWord">----</div>
  <div class="room-hint">Open sheggyb.github.io/mirror on your iPhone<br>and type this code</div>
  <div class="tv-status" id="tvStatus">Setting up...</div>
</div>

<!-- ═══ PHONE VIEW ═══ -->
<div id="phoneView" class="hidden">
  <h1>Screen Mirror</h1>
  <p class="sub">Type the code from your TV</p>
  <input class="code-input" id="codeInput" type="text" maxlength="4" placeholder="4-letter code" autocomplete="off" autocorrect="off" autocapitalize="characters">
  <button class="big-btn connect" id="connectBtn">Connect to TV</button>
  <button class="big-btn share hidden" id="shareBtn">Share Screen</button>
  <button class="big-btn stop hidden" id="stopBtn">Stop Sharing</button>
  <button class="big-btn refresh hidden" id="refreshBtn">Try Again</button>
  <div class="phone-status" id="phoneStatus">Enter the 4-letter code shown on your TV</div>
</div>

<!-- ═══ Video ═══ -->
<div id="videoOverlay">
  <video id="remoteVideo" autoplay playsinline></video>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.js"></script>
<script>
// ─── Config ─────────────────────────────────────────────────────
const MQTT_HOST = 'broker.emqx.io';
const MQTT_PORT = 8084;
const MQTT_PATH = '/mqtt';

const WORDS = [
  'BLUE','FROG','STAR','MOON','WAVE','FIRE','SNOW','LEAF','ROCK','BIRD',
  'FISH','TREE','WIND','GOLD','LAKE','SAND','DEER','WOLF','BEAR','LION',
  'HAWK','OWL','DUCK','SWAN','RAIN','CLOUD','ROSE','LILY','CAVE','HILL',
  'DUNE','REEF','MIST','DAWN','DUSK','GLEN','PINE','OAK','ELM','ASH',
  'COVE','BAY','CAPE','MESA','POND','BROOK','FERN','MOSS','VINE','SEED',
  'DRUM','BELL','HORN','HARP','FLUTE','LYRE','DOME','ARCH','TOWER','WALL',
  'GATE','BRIDGE','PIER','DOCK','PORT','SHIP','BOAT','RAFT','SAIL','OAR',
  'PATH','ROAD','LANE','FORD','PASS','PEAK','RIDGE','SLOPE','VALE','DELL',
  'IRON','ZINC','COAL','JADE','RUBY','OPAL','ONYX','PEAR','CORAL','AMBER'
];

const ice = { iceServers: [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' }
]};

// ─── DOM ────────────────────────────────────────────────────────
const tvView      = document.getElementById('tvView');
const phoneView   = document.getElementById('phoneView');
const roomWord    = document.getElementById('roomWord');
const tvStatusEl  = document.getElementById('tvStatus');
const codeInput   = document.getElementById('codeInput');
const connectBtn  = document.getElementById('connectBtn');
const shareBtn    = document.getElementById('shareBtn');
const stopBtn     = document.getElementById('stopBtn');
const refreshBtn  = document.getElementById('refreshBtn');
const phoneStatus = document.getElementById('phoneStatus');
const videoOverlay = document.getElementById('videoOverlay');
const remoteVideo  = document.getElementById('remoteVideo');

let pc = null, localStream = null;
let mqttTV = null, mqttPhone = null;
let room = '';

// ─── Device detection ───────────────────────────────────────────
const isPhone = window.innerWidth < 800 && 'ontouchstart' in window;

// ─── Helpers ────────────────────────────────────────────────────
function canShareScreen() {
  return !!(navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia);
}

function randomWord() {
  return WORDS[Math.floor(Math.random() * WORDS.length)];
}

function makeId() {
  return 'm-' + Math.random().toString(36).slice(2, 10);
}

function connectMQTT() {
  const client = new Paho.MQTT.Client(MQTT_HOST, MQTT_PORT, MQTT_PATH, makeId());
  return new Promise((resolve, reject) => {
    client.connect({
      onSuccess: () => resolve(client),
      onFailure: () => reject(new Error('Signaling failed. Check internet connection.')),
      timeout: 10,
      keepAliveInterval: 30,
      useSSL: true
    });
  });
}

// ════════════════════════════════════════════════════════════════
//  TV SIDE
// ════════════════════════════════════════════════════════════════
async function startTV() {
  room = randomWord();
  roomWord.textContent = room;
  tvStatusEl.textContent = 'Setting up...';
  tvStatusEl.className = 'tv-status';

  try {
    mqttTV = await connectMQTT();
    mqttTV.subscribe('mirror/' + room + '/phone');

    console.log('TV ready, room:', room);

    mqttTV.onMessageArrived = async (msg) => {
      try {
        const data = JSON.parse(msg.payloadString);
        if (!pc) return;
        if (data.type === 'answer') {
          await pc.setRemoteDescription({ type: 'answer', sdp: data.sdp });
          data.candidates?.forEach(c => {
            if (c.candidate) pc.addIceCandidate(new RTCIceCandidate(c)).catch(() => {});
          });
        } else if (data.type === 'ice' && data.candidate) {
          pc.addIceCandidate(new RTCIceCandidate(data)).catch(() => {});
        }
      } catch (e) { console.log('TV msg:', e); }
    };

    pc = new RTCPeerConnection(ice);
    const tvCandidates = [];

    pc.onicecandidate = e => {
      if (e.candidate) {
        tvCandidates.push(e.candidate);
        mqttTV.send('mirror/' + room + '/tv', JSON.stringify({
          type: 'ice', candidate: e.candidate.candidate,
          sdpMid: e.candidate.sdpMid, sdpMLineIndex: e.candidate.sdpMLineIndex
        }));
      }
    };

    pc.ontrack = event => {
      remoteVideo.srcObject = event.streams[0];
      videoOverlay.style.display = 'block';
      tvStatusEl.textContent = 'Connected — showing screen';
      tvStatusEl.className = 'tv-status ok';
    };

    pc.oniceconnectionstatechange = () => {
      const s = pc.iceConnectionState;
      if (s === 'connected' || s === 'completed') {
        tvStatusEl.textContent = 'Connected';
        tvStatusEl.className = 'tv-status ok';
      } else if (s === 'disconnected' || s === 'failed') {
        tvStatusEl.textContent = 'Lost connection — refresh page';
        tvStatusEl.className = 'tv-status error';
        videoOverlay.style.display = 'none';
        cleanupTV();
      }
    };

    pc.createDataChannel('mirror');
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await new Promise(r => setTimeout(r, 2000));

    mqttTV.send('mirror/' + room + '/tv', JSON.stringify({
      type: 'offer', sdp: offer.sdp,
      candidates: tvCandidates.map(c => ({
        candidate: c.candidate, sdpMid: c.sdpMid, sdpMLineIndex: c.sdpMLineIndex
      }))
    }));

    tvStatusEl.textContent = 'Waiting for iPhone...';

    // Auto-refresh if no connection after 2 min
    setTimeout(() => {
      if (pc && pc.iceConnectionState === 'new') {
        cleanupTV();
        startTV();
      }
    }, 120000);

  } catch (err) {
    tvStatusEl.textContent = 'Error: ' + err.message;
    tvStatusEl.className = 'tv-status error';
  }
}

function cleanupTV() {
  if (pc) { pc.close(); pc = null; }
  if (mqttTV) { try { mqttTV.disconnect(); } catch {} mqttTV = null; }
}

// ════════════════════════════════════════════════════════════════
//  PHONE SIDE
// ════════════════════════════════════════════════════════════════

// Check browser support on phone
if (isPhone && !canShareScreen()) {
  phoneStatus.textContent = 'Screen sharing not supported in this browser. Use Safari.';
  phoneStatus.className = 'phone-status error';
  connectBtn.classList.add('hidden');
  codeInput.classList.add('hidden');
}

connectBtn.addEventListener('click', async () => {
  const code = codeInput.value.trim().toUpperCase();
  if (code.length !== 4) {
    phoneStatus.textContent = 'Enter the 4-letter code from your TV';
    phoneStatus.className = 'phone-status error';
    return;
  }
  room = code;

  connectBtn.disabled = true;
  connectBtn.textContent = 'Connecting...';
  phoneStatus.textContent = 'Looking for TV...';
  phoneStatus.className = 'phone-status';

  try {
    mqttPhone = await connectMQTT();
    mqttPhone.subscribe('mirror/' + room + '/tv');

    mqttPhone.onMessageArrived = async (msg) => {
      try {
        const data = JSON.parse(msg.payloadString);
        if (!pc) return;
        if (data.type === 'offer') {
          await pc.setRemoteDescription({ type: 'offer', sdp: data.sdp });
          data.candidates?.forEach(c => {
            if (c.candidate) pc.addIceCandidate(new RTCIceCandidate(c)).catch(() => {});
          });
          connectBtn.classList.add('hidden');
          codeInput.classList.add('hidden');
          shareBtn.classList.remove('hidden');
          phoneStatus.textContent = 'Connected! Tap Share Screen.';
          phoneStatus.className = 'phone-status ok';
        } else if (data.type === 'ice' && data.candidate) {
          pc.addIceCandidate(new RTCIceCandidate(data)).catch(() => {});
        }
      } catch (e) { console.log('Phone msg:', e); }
    };

    pc = new RTCPeerConnection(ice);

    pc.onicecandidate = e => {
      if (e.candidate && mqttPhone) {
        mqttPhone.send('mirror/' + room + '/phone', JSON.stringify({
          type: 'ice', candidate: e.candidate.candidate,
          sdpMid: e.candidate.sdpMid, sdpMLineIndex: e.candidate.sdpMLineIndex
        }));
      }
    };

    pc.oniceconnectionstatechange = () => {
      if (pc.iceConnectionState === 'failed') {
        phoneStatus.textContent = 'Connection lost';
        phoneStatus.className = 'phone-status error';
        refreshBtn.classList.remove('hidden');
      }
    };

  } catch (err) {
    connectBtn.disabled = false;
    connectBtn.textContent = 'Connect to TV';
    phoneStatus.textContent = err.message;
    phoneStatus.className = 'phone-status error';
  }
});

shareBtn.addEventListener('click', async () => {
  shareBtn.disabled = true;
  shareBtn.textContent = 'Tap "Start Broadcast"...';

  try {
    localStream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: { ideal: 15 } },
      audio: false
    });

    shareBtn.textContent = 'Connecting...';
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await new Promise(r => setTimeout(r, 1500));

    mqttPhone.send('mirror/' + room + '/phone', JSON.stringify({
      type: 'answer', sdp: answer.sdp, candidates: []
    }));

    shareBtn.classList.add('hidden');
    stopBtn.classList.remove('hidden');
    phoneStatus.textContent = 'Sharing to TV';
    phoneStatus.className = 'phone-status ok';

    localStream.getVideoTracks()[0].onended = () => stopPhone(true);

  } catch (err) {
    shareBtn.disabled = false;
    shareBtn.textContent = 'Share Screen';
    if (err.name === 'NotAllowedError') phoneStatus.textContent = 'Permission denied — try again';
    else if (err.name === 'AbortError') phoneStatus.textContent = 'Cancelled';
    else phoneStatus.textContent = err.message;
    phoneStatus.className = 'phone-status error';
  }
});

stopBtn.addEventListener('click', () => stopPhone(false));

refreshBtn.addEventListener('click', () => {
  stopPhone(false);
  refreshBtn.classList.add('hidden');
  connectBtn.classList.remove('hidden');
  codeInput.classList.remove('hidden');
  connectBtn.disabled = false;
  connectBtn.textContent = 'Connect to TV';
  phoneStatus.textContent = 'Enter the 4-letter code shown on your TV';
  phoneStatus.className = 'phone-status';
});

function stopPhone(systemStop) {
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (pc) { pc.close(); pc = null; }
  if (mqttPhone) { try { mqttPhone.disconnect(); } catch {} mqttPhone = null; }
  stopBtn.classList.add('hidden');
  shareBtn.classList.add('hidden');
  refreshBtn.classList.remove('hidden');
  phoneStatus.textContent = systemStop ? 'Sharing stopped' : 'Stopped';
  phoneStatus.className = 'phone-status';
}

// ════════════════════════════════════════════════════════════════
//  GO
// ════════════════════════════════════════════════════════════════
if (isPhone) {
  phoneView.classList.remove('hidden');
} else {
  tvView.classList.remove('hidden');
  startTV();
}
</script>
</body>
</html>
