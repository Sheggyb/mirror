<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Permissions-Policy" content="display-capture=(self)">
<title>Screen Mirror</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #000; color: #fff;
    min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
  }
  .hidden { display: none !important; }

  #tvView { text-align: center; padding: 5vh 5vw; width: 100%; }
  #tvView .room-word {
    font-size: min(22vw, 14rem); font-weight: 900;
    letter-spacing: 0.15em; color: #4f46e5; line-height: 1;
  }
  #tvView .room-hint {
    font-size: min(4vw, 1.5rem); color: #555; margin-top: 3vh;
  }
  #tvView .tv-status {
    font-size: min(3vw, 1.2rem); color: #555; margin-top: 3vh;
  }
  #tvView .tv-status.ok { color: #4ade80; }
  #tvView .tv-status.error { color: #f87171; }

  #phoneView { width: 100%; max-width: 400px; padding: 24px; text-align: center; }
  #phoneView h1 { font-size: 1.5rem; margin-bottom: 4px; }
  #phoneView .sub { color: #999; font-size: 0.85rem; margin-bottom: 24px; }
  #phoneView .big-btn {
    display: block; width: 100%; padding: 20px; border: none;
    border-radius: 14px; font-size: 1.2rem; font-weight: 700;
    cursor: pointer; color: #fff; background: #4f46e5;
  }
  #phoneView .big-btn:active { opacity: 0.7; }
  #phoneView .big-btn:disabled { opacity: 0.4; }
  #phoneView .big-btn.share { background: #059669; }
  #phoneView .big-btn.stop { background: #dc2626; }

  #phoneView .phone-status {
    font-size: 0.9rem; color: #bbb; margin-top: 14px; min-height: 1.2em;
  }
  #phoneView .phone-status.error { color: #f87171; }
  #phoneView .phone-status.ok { color: #4ade80; }

  #phoneView .scan-progress {
    width: 100%; height: 4px; background: #222; border-radius: 2px;
    margin-top: 16px; overflow: hidden;
  }
  #phoneView .scan-bar {
    height: 100%; background: #4f46e5;
    transition: width 0.3s; width: 0%;
  }

  #videoOverlay {
    position: fixed; inset: 0; background: #000;
    display: none; z-index: 100;
  }
  #videoOverlay video { width: 100%; height: 100%; object-fit: contain; }

  .help-box {
    background: #1a1a2e; border-radius: 12px; padding: 20px; margin-top: 20px;
    text-align: left; line-height: 1.7; font-size: 0.85rem;
  }
  .help-box p { color: #ccc; margin-bottom: 6px; }
  .help-box strong { color: #f87171; }
</style>
</head>
<body>

<div id="tvView" class="hidden">
  <div class="room-word" id="roomWord">....</div>
  <div class="room-hint">📺 TV — iPhone should find this automatically<br>or type this number on your phone</div>
  <div class="tv-status" id="tvStatus">Setting up...</div>
</div>

<div id="phoneView" class="hidden">
  <h1>📱 Screen Mirror</h1>
  <p class="sub" id="phoneSub">Scanning your network for the TV...</p>
  <div class="scan-progress"><div class="scan-bar" id="scanBar"></div></div>
  <button class="big-btn hidden" id="shareBtn">Share Screen</button>
  <button class="big-btn stop hidden" id="stopBtn">Stop Sharing</button>
  <div class="phone-status" id="phoneStatus"></div>
  <div id="helpBox"></div>
</div>

<div id="videoOverlay">
  <video id="remoteVideo" autoplay playsinline></video>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.js"></script>
<script>
const MQTT_HOST = 'broker.emqx.io';
const MQTT_PORT = 8084;
const MQTT_PATH = '/mqtt';

const ice = { iceServers: [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' }
]};

const tvView = document.getElementById('tvView');
const phoneView = document.getElementById('phoneView');
const roomWord = document.getElementById('roomWord');
const tvStatusEl = document.getElementById('tvStatus');
const phoneSub = document.getElementById('phoneSub');
const scanBar = document.getElementById('scanBar');
const shareBtn = document.getElementById('shareBtn');
const stopBtn = document.getElementById('stopBtn');
const phoneStatus = document.getElementById('phoneStatus');
const helpBox = document.getElementById('helpBox');
const videoOverlay = document.getElementById('videoOverlay');
const remoteVideo = document.getElementById('remoteVideo');

let pc = null, localStream = null;
let mqttTV = null, mqttPhone = null;
let retryTimer = null;
let room = '';

const isPhone = window.innerWidth < 800 && 'ontouchstart' in window;

function makeId() {
  return 'm-' + Math.random().toString(36).slice(2, 10);
}

function connectMQTT() {
  const client = new Paho.MQTT.Client(MQTT_HOST, MQTT_PORT, MQTT_PATH, makeId());
  return new Promise((resolve, reject) => {
    client.connect({
      onSuccess: () => resolve(client),
      onFailure: () => reject(new Error('Network error')),
      timeout: 10, keepAliveInterval: 30, useSSL: true
    });
  });
}

// ─── Get local IP via WebRTC trick ──────────────────────────────
async function getLocalIP() {
  return new Promise((resolve) => {
    const pc = new RTCPeerConnection(ice);
    pc.createDataChannel('');
    pc.createOffer().then(offer => pc.setLocalDescription(offer));
    pc.onicecandidate = e => {
      if (e.candidate) {
        const ip = e.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/);
        if (ip && !ip[1].startsWith('169.254')) {
          pc.close();
          resolve(ip[1]);
        }
      } else {
        pc.close();
        resolve(null);
      }
    };
    setTimeout(() => { pc.close(); resolve(null); }, 3000);
  });
}

// ═══════════════ TV ═══════════════
async function startTV() {
  tvStatusEl.textContent = 'Detecting network...';
  tvStatusEl.className = 'tv-status';

  const ip = await getLocalIP();
  if (!ip) {
    tvStatusEl.textContent = 'Could not detect network. Refresh.';
    tvStatusEl.className = 'tv-status error';
    return;
  }

  room = ip.replace(/\./g, '-');
  const lastOctet = ip.split('.').pop();
  roomWord.textContent = lastOctet;
  tvStatusEl.textContent = 'Waiting for iPhone...';

  try {
    mqttTV = await connectMQTT();
    mqttTV.subscribe('mirror/' + room + '/phone');

    let answered = false;
    function sendOffer() {
      if (!mqttTV || answered) return;
      mqttTV.send('mirror/'+room+'/tv', JSON.stringify({
        type:'offer', sdp:offer.sdp,
        candidates: tvCandidates.map(c => ({
          candidate:c.candidate, sdpMid:c.sdpMid, sdpMLineIndex:c.sdpMLineIndex
        }))
      }));
    }

    mqttTV.onMessageArrived = async (msg) => {
      try {
        const data = JSON.parse(msg.payloadString);
        if (data.type === 'hello') { sendOffer(); }
        else if (data.type === 'answer') {
          answered = true;
          if (retryTimer) { clearInterval(retryTimer); }
          await pc.setRemoteDescription({ type:'answer', sdp:data.sdp });
          data.candidates?.forEach(c => {
            if (c.candidate) pc.addIceCandidate(new RTCIceCandidate(c)).catch(()=>{});
          });
        } else if (data.type === 'ice' && data.candidate) {
          pc.addIceCandidate(new RTCIceCandidate(data)).catch(()=>{});
        }
      } catch(e) {}
    };

    pc = new RTCPeerConnection(ice);
    const tvCandidates = [];

    pc.onicecandidate = e => {
      if (e.candidate) {
        tvCandidates.push(e.candidate);
        mqttTV.send('mirror/'+room+'/tv', JSON.stringify({
          type:'ice', candidate:e.candidate.candidate,
          sdpMid:e.candidate.sdpMid, sdpMLineIndex:e.candidate.sdpMLineIndex
        }));
      }
    };

    pc.ontrack = event => {
      remoteVideo.srcObject = event.streams[0];
      videoOverlay.style.display = 'block';
      tvStatusEl.textContent = 'Connected — showing screen';
      tvStatusEl.className = 'tv-status ok';
    };

    pc.oniceconnectionstatechange = () => {
      const s = pc.iceConnectionState;
      if (s === 'connected' || s === 'completed') {
        tvStatusEl.textContent = 'Connected';
        tvStatusEl.className = 'tv-status ok';
      } else if (s === 'disconnected' || s === 'failed') {
        tvStatusEl.textContent = 'Lost — refresh page';
        tvStatusEl.className = 'tv-status error';
        videoOverlay.style.display = 'none';
        cleanupTV();
      }
    };

    pc.createDataChannel('mirror');
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await new Promise(r => setTimeout(r, 2000));
    sendOffer();
    retryTimer = setInterval(sendOffer, 3000);

    setTimeout(() => {
      if (pc && pc.iceConnectionState === 'new') { cleanupTV(); startTV(); }
    }, 120000);

  } catch(err) {
    tvStatusEl.textContent = 'Error: ' + err.message;
    tvStatusEl.className = 'tv-status error';
  }
}

function cleanupTV() {
  if (retryTimer) { clearInterval(retryTimer); retryTimer = null; }
  if (pc) { pc.close(); pc = null; }
  if (mqttTV) { try { mqttTV.disconnect(); } catch{} mqttTV = null; }
}

// ═══════════════ PHONE — auto-scan ─═════════════════════════════
async function startPhone() {
  phoneStatus.textContent = 'Detecting your network...';

  const myIP = await getLocalIP();
  if (!myIP) {
    phoneStatus.textContent = 'Network error. Check Wi-Fi.';
    phoneStatus.className = 'phone-status error';
    return;
  }

  // Build list of possible TV IPs (same subnet, .1 through .254)
  const parts = myIP.split('.');
  const subnet = parts.slice(0, 3).join('.');
  const candidates = [];
  for (let i = 1; i <= 254; i++) {
    if (parts[3] !== String(i)) { // skip own IP
      candidates.push(subnet + '.' + i);
    }
  }

  phoneSub.textContent = 'Scanning ' + candidates.length + ' addresses for your TV...';
  phoneStatus.textContent = 'This takes a few seconds...';

  // Scan in parallel batches of 10
  const BATCH = 10;
  let foundRoom = null;

  for (let i = 0; i < candidates.length; i += BATCH) {
    const batch = candidates.slice(i, i + BATCH);
    const results = await Promise.all(batch.map(ip => tryConnect(ip)));

    for (let j = 0; j < results.length; j++) {
      if (results[j]) {
        foundRoom = results[j];
        break;
      }
    }

    scanBar.style.width = Math.min(100, ((i + BATCH) / candidates.length) * 100) + '%';

    if (foundRoom) break;
  }

  if (!foundRoom) {
    phoneSub.textContent = 'TV not found on your network';
    phoneStatus.textContent = 'Make sure both devices are on the same Wi-Fi and the TV page is open.';
    phoneStatus.className = 'phone-status error';
    scanBar.style.width = '100%';
    scanBar.style.background = '#dc2626';
    return;
  }

  // Found it!
  room = foundRoom;
  scanBar.style.width = '100%';
  scanBar.style.background = '#4ade80';
  phoneSub.textContent = 'TV found!';
  phoneStatus.textContent = 'Connected! Tap Share Screen.';
  phoneStatus.className = 'phone-status ok';

  try {
    mqttPhone = await connectMQTT();
    mqttPhone.subscribe('mirror/' + room + '/tv');
    mqttPhone.send('mirror/' + room + '/phone', JSON.stringify({type:'hello'}));

    mqttPhone.onMessageArrived = async (msg) => {
      try {
        const data = JSON.parse(msg.payloadString);
        if (!pc) return;
        if (data.type === 'offer') {
          await pc.setRemoteDescription({ type:'offer', sdp:data.sdp });
          data.candidates?.forEach(c => {
            if (c.candidate) pc.addIceCandidate(new RTCIceCandidate(c)).catch(()=>{});
          });
          shareBtn.classList.remove('hidden');
        } else if (data.type === 'ice' && data.candidate) {
          pc.addIceCandidate(new RTCIceCandidate(data)).catch(()=>{});
        }
      } catch(e) {}
    };

    pc = new RTCPeerConnection(ice);
    pc.onicecandidate = e => {
      if (e.candidate && mqttPhone) {
        mqttPhone.send('mirror/'+room+'/phone', JSON.stringify({
          type:'ice', candidate:e.candidate.candidate,
          sdpMid:e.candidate.sdpMid, sdpMLineIndex:e.candidate.sdpMLineIndex
        }));
      }
    };
    pc.oniceconnectionstatechange = () => {
      if (pc.iceConnectionState === 'failed') {
        phoneStatus.textContent = 'Connection lost';
        phoneStatus.className = 'phone-status error';
      }
    };

  } catch(err) {
    phoneStatus.textContent = err.message;
    phoneStatus.className = 'phone-status error';
  }
}

async function tryConnect(ip) {
  const roomName = ip.replace(/\./g, '-');
  try {
    const client = await new Promise((resolve, reject) => {
      const c = new Paho.MQTT.Client(MQTT_HOST, MQTT_PORT, MQTT_PATH, makeId());
      const timeout = setTimeout(() => { try { c.disconnect(); } catch{} reject('timeout'); }, 1500);
      c.connect({
        onSuccess: () => { clearTimeout(timeout); resolve(c); },
        onFailure: () => { clearTimeout(timeout); reject('fail'); },
        timeout: 5, keepAliveInterval: 10, useSSL: true
      });
    });

    // Quick check: is TV in this room? Send hello and wait briefly for a response
    let found = false;
    client.subscribe('mirror/' + roomName + '/tv');
    client.send('mirror/' + roomName + '/phone', JSON.stringify({type:'hello'}));

    await new Promise((resolve) => {
      client.onMessageArrived = () => { found = true; resolve(); };
      setTimeout(resolve, 1000);
    });

    try { client.disconnect(); } catch{}

    if (found) return roomName;
  } catch(e) {}
  return null;
}

// ─── Share / Stop ───────────────────────────────────────────────
shareBtn.addEventListener('click', async () => {
  shareBtn.disabled = true;
  shareBtn.textContent = 'Tap "Start Broadcast"...';

  try {
    localStream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: { ideal: 15 } }, audio: false
    });

    shareBtn.textContent = 'Connecting...';
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await new Promise(r => setTimeout(r, 1500));

    mqttPhone.send('mirror/'+room+'/phone', JSON.stringify({
      type:'answer', sdp:answer.sdp, candidates:[]
    }));

    shareBtn.classList.add('hidden');
    stopBtn.classList.remove('hidden');
    phoneStatus.textContent = 'Sharing to TV';
    phoneStatus.className = 'phone-status ok';
    localStream.getVideoTracks()[0].onended = () => stopPhone(true);

  } catch(err) {
    shareBtn.disabled = false;
    shareBtn.textContent = 'Share Screen';
    phoneStatus.textContent = 'Error: ' + (err.message || err.name);
    phoneStatus.className = 'phone-status error';

    helpBox.innerHTML = `
      <div class="help-box">
        <p><strong>Screen sharing not available.</strong></p>
        <p>iOS Safari may block this. ${err.name}: ${err.message || ''}</p>
      </div>`;
  }
});

stopBtn.addEventListener('click', () => stopPhone(false));

function stopPhone(systemStop) {
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (pc) { pc.close(); pc = null; }
  if (mqttPhone) { try { mqttPhone.disconnect(); } catch{} mqttPhone = null; }
  stopBtn.classList.add('hidden');
  shareBtn.classList.remove('hidden');
  shareBtn.textContent = 'Share Screen';
  shareBtn.disabled = false;
  phoneStatus.textContent = systemStop ? 'Sharing stopped' : 'Stopped';
  phoneStatus.className = 'phone-status';
}

// ═══════════════ GO ═══════════════
if (isPhone) {
  phoneView.classList.remove('hidden');
  startPhone();
} else {
  tvView.classList.remove('hidden');
  startTV();
}
</script>
</body>
</html>
