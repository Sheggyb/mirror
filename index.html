<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Screen Mirror</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #000;
    color: #fff;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .hidden { display: none !important; }

  .container {
    text-align: center;
    padding: 5vh 5vw;
    width: 100%;
    max-width: 500px;
  }

  .room-word {
    font-size: min(20vw, 10rem);
    font-weight: 900;
    letter-spacing: 0.15em;
    color: #4f46e5;
    line-height: 1;
  }
  .room-hint {
    font-size: min(3.5vw, 1.1rem);
    color: #555;
    margin: 1.5vh 0 4vh;
  }
  .status-line {
    font-size: min(3vw, 1rem);
    color: #555;
    margin-bottom: 3vh;
    min-height: 1.5em;
  }
  .status-line.ok { color: #4ade80; }
  .status-line.error { color: #f87171; }

  .divider {
    width: 60%;
    border: none;
    border-top: 1px solid #222;
    margin: 0 auto 3vh;
  }

  .code-input {
    width: 100%;
    max-width: 280px;
    padding: 16px;
    background: #1a1a2e;
    border: 2px solid #333;
    border-radius: 14px;
    color: #fff;
    font-size: 1.4rem;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-weight: 700;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    outline: none;
    margin: 0 auto 14px;
  }
  .code-input:focus { border-color: #4f46e5; }

  .big-btn {
    display: block;
    width: 100%;
    max-width: 280px;
    padding: 18px;
    border: none;
    border-radius: 14px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    margin: 0 auto 10px;
    color: #fff;
  }
  .big-btn:active { opacity: 0.7; }
  .big-btn:disabled { opacity: 0.4; }
  .big-btn.connect { background: #4f46e5; }
  .big-btn.share { background: #059669; }
  .big-btn.stop { background: #dc2626; }

  .phone-hint {
    font-size: 0.8rem;
    color: #444;
    margin-top: 4px;
  }

  /* Video overlay */
  #videoOverlay {
    position: fixed;
    inset: 0;
    background: #000;
    display: none;
    z-index: 100;
  }
  #videoOverlay video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .unsupported-box {
    background: #1a1a2e;
    border-radius: 12px;
    padding: 24px;
    margin-top: 16px;
    text-align: left;
    line-height: 1.7;
    font-size: 0.9rem;
    max-width: 400px;
  }
  .unsupported-box p { color: #ccc; }
  .unsupported-box strong { color: #f87171; }
</style>
</head>
<body>

<div class="container" id="mainView">
  <!-- TV: reads this code -->
  <div class="room-word" id="roomWord">----</div>
  <div class="room-hint">1. Open this page on your TV first<br>2. Then on your iPhone, type this code below</div>
  <div class="status-line" id="tvStatus">Setting up...</div>

  <hr class="divider">

  <!-- Phone: types the code -->
  <input class="code-input" id="codeInput" type="text" maxlength="4" placeholder="Type the 4-letter code" autocomplete="off" autocorrect="off" autocapitalize="characters">
  <button class="big-btn connect" id="connectBtn">Connect to TV</button>
  <button class="big-btn share hidden" id="shareBtn">Share Screen</button>
  <button class="big-btn stop hidden" id="stopBtn">Stop Sharing</button>
  <p class="phone-hint" id="phoneHint">(only needed on your iPhone)</p>

  <div id="unsupportedMsg"></div>
</div>

<div id="videoOverlay">
  <video id="remoteVideo" autoplay playsinline></video>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.js"></script>
<script>
// ─── Config ─────────────────────────────────────────────────────
const MQTT_HOST = 'broker.emqx.io';
const MQTT_PORT = 8084;           // WSS port
const MQTT_PATH = '/mqtt';

const WORDS = [
  'BLUE','FROG','STAR','MOON','WAVE','FIRE','SNOW','LEAF','ROCK','BIRD',
  'FISH','TREE','WIND','GOLD','LAKE','SAND','DEER','WOLF','BEAR','LION',
  'HAWK','OWL','DUCK','SWAN','RAIN','CLOUD','ROSE','LILY','CAVE','HILL',
  'DUNE','REEF','MIST','DAWN','DUSK','GLEN','PINE','OAK','ELM','ASH',
  'COVE','BAY','CAPE','MESA','POND','BROOK','FERN','MOSS','VINE','SEED',
  'DRUM','BELL','HORN','HARP','FLUTE','LYRE','DOME','ARCH','TOWER','WALL',
  'GATE','BRIDGE','PIER','DOCK','PORT','SHIP','BOAT','RAFT','SAIL','OAR',
  'PATH','ROAD','LANE','FORD','PASS','PEAK','RIDGE','SLOPE','VALE','DELL',
  'IRON','ZINC','COAL','JADE','RUBY','OPAL','ONYX','PEAR','CORAL','AMBER'
];

const ice = { iceServers: [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' }
]};

// ─── DOM ────────────────────────────────────────────────────────
const roomWord    = document.getElementById('roomWord');
const tvStatus    = document.getElementById('tvStatus');
const codeInput   = document.getElementById('codeInput');
const connectBtn  = document.getElementById('connectBtn');
const shareBtn    = document.getElementById('shareBtn');
const stopBtn     = document.getElementById('stopBtn');
const phoneHint   = document.getElementById('phoneHint');
const unsupportedMsg = document.getElementById('unsupportedMsg');
const videoOverlay  = document.getElementById('videoOverlay');
const remoteVideo   = document.getElementById('remoteVideo');

let pc = null, localStream = null, mqttTV = null, mqttPhone = null;
let room = '';

// ─── Helpers ────────────────────────────────────────────────────
function canShareScreen() {
  return !!(navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia);
}

function randomRoom() {
  return WORDS[Math.floor(Math.random() * WORDS.length)];
}

function makeClientId() {
  return 'mirror-' + Math.random().toString(36).slice(2, 10);
}

// ─── MQTT connect (WSS) ─────────────────────────────────────────
function connectMQTT() {
  const client = new Paho.MQTT.Client(MQTT_HOST, MQTT_PORT, MQTT_PATH, makeClientId());
  return new Promise((resolve, reject) => {
    client.connect({
      onSuccess: () => resolve(client),
      onFailure: (err) => reject(new Error('Signaling failed. Check internet.')),
      timeout: 10,
      keepAliveInterval: 30,
      useSSL: true
    });
  });
}

// ════════════════════════════════════════════════════════════════
//  TV SIDE — runs on page load
// ════════════════════════════════════════════════════════════════
async function initTV() {
  room = randomRoom();
  roomWord.textContent = room;
  tvStatus.textContent = 'Setting up connection...';

  try {
    mqttTV = await connectMQTT();

    // TV subscribes to phone messages
    mqttTV.subscribe('mirror/' + room + '/phone');

    mqttTV.onMessageArrived = async (msg) => {
      try {
        const data = JSON.parse(msg.payloadString);
        if (data.type === 'answer') {
          await pc.setRemoteDescription({ type: 'answer', sdp: data.sdp });
          if (data.candidates) {
            for (const c of data.candidates) {
              if (c.candidate) try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch {}
            }
          }
        } else if (data.type === 'ice') {
          if (data.candidate) try { await pc.addIceCandidate(new RTCIceCandidate(data)); } catch {}
        }
      } catch (e) { console.log('TV msg error:', e); }
    };

    pc = new RTCPeerConnection(ice);
    const tvCandidates = [];

    pc.onicecandidate = e => {
      if (e.candidate) {
        tvCandidates.push(e.candidate);
        mqttTV.send('mirror/' + room + '/tv', JSON.stringify({
          type: 'ice', candidate: e.candidate.candidate,
          sdpMid: e.candidate.sdpMid, sdpMLineIndex: e.candidate.sdpMLineIndex
        }));
      }
    };

    pc.ontrack = event => {
      remoteVideo.srcObject = event.streams[0];
      videoOverlay.style.display = 'block';
      tvStatus.textContent = 'Connected! Showing screen.';
      tvStatus.className = 'status-line ok';
    };

    pc.oniceconnectionstatechange = () => {
      const s = pc.iceConnectionState;
      if (s === 'connected' || s === 'completed') {
        tvStatus.textContent = 'Connected!';
        tvStatus.className = 'status-line ok';
      } else if (s === 'disconnected' || s === 'failed') {
        tvStatus.textContent = 'Lost connection — refresh page';
        tvStatus.className = 'status-line error';
        videoOverlay.style.display = 'none';
      }
    };

    pc.createDataChannel('mirror');
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await new Promise(r => setTimeout(r, 2000));

    mqttTV.send('mirror/' + room + '/tv', JSON.stringify({
      type: 'offer',
      sdp: offer.sdp,
      candidates: tvCandidates.map(c => ({
        candidate: c.candidate, sdpMid: c.sdpMid, sdpMLineIndex: c.sdpMLineIndex
      }))
    }));

    tvStatus.textContent = 'Ready — waiting for iPhone...';

    // Timeout after 2 min
    setTimeout(() => {
      if (pc && pc.iceConnectionState === 'new') {
        tvStatus.textContent = 'Timed out — refreshing...';
        cleanupTV();
        setTimeout(initTV, 1000);
      }
    }, 120000);

  } catch (err) {
    tvStatus.textContent = 'Error: ' + err.message;
    tvStatus.className = 'status-line error';
  }
}

function cleanupTV() {
  if (pc) { pc.close(); pc = null; }
  if (mqttTV) { try { mqttTV.disconnect(); } catch {} mqttTV = null; }
}

// ════════════════════════════════════════════════════════════════
//  PHONE SIDE — user types code and hits Connect
// ════════════════════════════════════════════════════════════════
connectBtn.addEventListener('click', async () => {
  const code = codeInput.value.trim().toUpperCase();
  if (code.length !== 4) {
    return;
  }

  // Check if phone can share screen
  if (!canShareScreen()) {
    const ua = navigator.userAgent;
    const isIOS = /iPhone|iPad|iPod/.test(ua);
    let msg = '<div class="unsupported-box"><p><strong>Screen sharing not supported</strong></p>';
    if (isIOS) {
      const iosVer = (/OS (\d+_\d+)/.exec(ua)||['','?'])[1].replace('_','.');
      msg += '<p style="margin-top:8px;">Requires <strong>iOS 16.4+</strong> (you have ' + iosVer + ').</p>';
      msg += '<p style="margin-top:8px;">Make sure you opened this page in <strong>Safari</strong>, not from another app.</p>';
    }
    msg += '</div>';
    unsupportedMsg.innerHTML = msg;
    return;
  }

  room = code;
  connectBtn.disabled = true;
  connectBtn.textContent = 'Connecting...';

  try {
    mqttPhone = await connectMQTT();

    // Phone subscribes to TV messages
    mqttPhone.subscribe('mirror/' + room + '/tv');

    mqttPhone.onMessageArrived = async (msg) => {
      try {
        const data = JSON.parse(msg.payloadString);
        if (data.type === 'offer') {
          await pc.setRemoteDescription({ type: 'offer', sdp: data.sdp });
          if (data.candidates) {
            for (const c of data.candidates) {
              if (c.candidate) try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch {}
            }
          }
          // Ready to share
          connectBtn.classList.add('hidden');
          codeInput.classList.add('hidden');
          phoneHint.classList.add('hidden');
          shareBtn.classList.remove('hidden');
          tvStatus.textContent = 'Connected! Ready to share.';
          tvStatus.className = 'status-line ok';
        } else if (data.type === 'ice') {
          if (data.candidate) try { await pc.addIceCandidate(new RTCIceCandidate(data)); } catch {}
        }
      } catch (e) { console.log('Phone msg error:', e); }
    };

    pc = new RTCPeerConnection(ice);

    pc.onicecandidate = e => {
      if (e.candidate) {
        mqttPhone.send('mirror/' + room + '/phone', JSON.stringify({
          type: 'ice', candidate: e.candidate.candidate,
          sdpMid: e.candidate.sdpMid, sdpMLineIndex: e.candidate.sdpMLineIndex
        }));
      }
    };

    pc.oniceconnectionstatechange = () => {
      if (pc.iceConnectionState === 'failed') {
        tvStatus.textContent = 'Connection lost';
        tvStatus.className = 'status-line error';
      }
    };

  } catch (err) {
    connectBtn.disabled = false;
    connectBtn.textContent = 'Connect to TV';
    tvStatus.textContent = err.message;
    tvStatus.className = 'status-line error';
  }
});

// ─── Share Screen button ────────────────────────────────────────
shareBtn.addEventListener('click', async () => {
  shareBtn.disabled = true;
  shareBtn.textContent = 'Requesting permission...';

  try {
    localStream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: { ideal: 15 } },
      audio: false
    });

    shareBtn.textContent = 'Connecting...';
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await new Promise(r => setTimeout(r, 1500));

    mqttPhone.send('mirror/' + room + '/phone', JSON.stringify({
      type: 'answer', sdp: answer.sdp, candidates: []
    }));

    shareBtn.classList.add('hidden');
    stopBtn.classList.remove('hidden');
    tvStatus.textContent = 'Sharing screen to TV';
    tvStatus.className = 'status-line ok';

    localStream.getVideoTracks()[0].onended = () => stopSharing(true);

  } catch (err) {
    shareBtn.disabled = false;
    shareBtn.textContent = 'Share Screen';
    if (err.name === 'NotAllowedError') {
      tvStatus.textContent = 'Permission denied — try again';
    } else if (err.name === 'AbortError') {
      tvStatus.textContent = 'Cancelled';
    } else {
      tvStatus.textContent = 'Error: ' + err.message;
    }
    tvStatus.className = 'status-line error';
  }
});

stopBtn.addEventListener('click', () => stopSharing(false));

function stopSharing(systemStop) {
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (pc) { pc.close(); pc = null; }
  if (mqttPhone) { try { mqttPhone.disconnect(); } catch {} mqttPhone = null; }
  stopBtn.classList.add('hidden');
  shareBtn.classList.remove('hidden');
  shareBtn.textContent = 'Share Screen';
  shareBtn.disabled = false;
  tvStatus.textContent = systemStop ? 'Sharing stopped' : 'Stopped';
  tvStatus.className = 'status-line';
}

// ════════════════════════════════════════════════════════════════
//  GO — always start TV, phone is opt-in via Connect button
// ════════════════════════════════════════════════════════════════
initTV();
</script>
</body>
</html>
