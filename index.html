<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Screen Mirror</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #000;
    color: #fff;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hidden { display: none !important; }

  /* ─── TV (Receiver) ─────────────────────────────── */
  #tvView {
    text-align: center;
    padding: 5vh 5vw;
    width: 100%;
  }
  #tvView .room-word {
    font-size: min(20vw, 12rem);
    font-weight: 900;
    letter-spacing: 0.15em;
    color: #4f46e5;
    line-height: 1;
  }
  #tvView .room-hint {
    font-size: min(5vw, 2rem);
    color: #555;
    margin-top: 2vh;
  }
  #tvView .tv-status {
    font-size: min(3.5vw, 1.5rem);
    color: #555;
    margin-top: 4vh;
  }
  #tvView .tv-status.connected { color: #4ade80; }
  #tvView .tv-status.error { color: #f87171; }

  /* ─── iPhone (Sharer) ───────────────────────────── */
  #phoneView {
    width: 100%;
    max-width: 400px;
    padding: 24px;
    text-align: center;
  }
  #phoneView h1 { font-size: 1.5rem; margin-bottom: 4px; }
  #phoneView .sub { color: #999; font-size: 0.85rem; margin-bottom: 28px; }

  #phoneView .code-input {
    width: 100%;
    padding: 18px;
    background: #1a1a2e;
    border: 2px solid #333;
    border-radius: 14px;
    color: #fff;
    font-size: 1.6rem;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-weight: 700;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    outline: none;
    margin-bottom: 16px;
  }
  #phoneView .code-input:focus { border-color: #4f46e5; }

  #phoneView .big-btn {
    display: block;
    width: 100%;
    padding: 20px;
    border: none;
    border-radius: 14px;
    font-size: 1.2rem;
    font-weight: 700;
    cursor: pointer;
  }
  #phoneView .big-btn:active { opacity: 0.7; }
  #phoneView .big-btn.connect { background: #4f46e5; color: #fff; }
  #phoneView .big-btn.share { background: #4f46e5; color: #fff; }
  #phoneView .big-btn.stop { background: #dc2626; color: #fff; }
  #phoneView .big-btn:disabled { opacity: 0.4; }

  #phoneView .phone-status {
    font-size: 0.9rem;
    color: #bbb;
    margin-top: 14px;
    min-height: 1.2em;
  }
  #phoneView .phone-status.error { color: #f87171; }
  #phoneView .phone-status.ok { color: #4ade80; }

  /* ─── Video overlay (TV) ────────────────────────── */
  #videoOverlay {
    position: fixed;
    inset: 0;
    background: #000;
    display: none;
    z-index: 100;
  }
  #videoOverlay video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* ─── Unsupported box ───────────────────────────── */
  .unsupported-box {
    background: #1a1a2e;
    border-radius: 12px;
    padding: 24px;
    margin-top: 16px;
    text-align: left;
    line-height: 1.7;
    font-size: 0.9rem;
  }
  .unsupported-box p { color: #ccc; }
  .unsupported-box strong { color: #f87171; }
</style>
</head>
<body>

<!-- ═══ TV VIEW ═══ -->
<div id="tvView" class="hidden">
  <div class="room-word" id="roomWord">----</div>
  <div class="room-hint">Open sheggyb.github.io/mirror on your iPhone<br>and type this code</div>
  <div class="tv-status" id="tvStatus">Waiting for connection...</div>
</div>

<!-- ═══ PHONE VIEW ═══ -->
<div id="phoneView" class="hidden">
  <h1>Screen Mirror</h1>
  <p class="sub">Connect to your TV</p>
  <input class="code-input" id="codeInput" type="text" maxlength="4" placeholder="Code from TV" autocomplete="off" autocorrect="off" autocapitalize="characters">
  <button class="big-btn connect" id="connectBtn">Connect to TV</button>
  <button class="big-btn share hidden" id="shareBtn">Share Screen</button>
  <button class="big-btn stop hidden" id="stopBtn">Stop Sharing</button>
  <div class="phone-status" id="phoneStatus">Enter the 4-letter code shown on your TV</div>
</div>

<!-- ═══ Video ═══ -->
<div id="videoOverlay">
  <video id="remoteVideo" autoplay playsinline></video>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.js"></script>
<script>
// ─── Config ─────────────────────────────────────────────────────
const MQTT_HOST = 'broker.emqx.io';
const MQTT_PORT = 8083;
const MQTT_PATH = '/mqtt';

const WORDS = [
  'BLUE','FROG','STAR','MOON','WAVE','FIRE','SNOW','LEAF','ROCK','BIRD',
  'FISH','TREE','WIND','GOLD','LAKE','SAND','DEER','WOLF','BEAR','LION',
  'HAWK','OWL','DUCK','SWAN','RAIN','CLOUD','ROSE','LILY','CAVE','HILL',
  'DUNE','REEF','MIST','DAWN','DUSK','GLEN','PINE','OAK','ELM','ASH',
  'COVE','BAY','CAPE','MESA','POND','BROOK','FERN','MOSS','VINE','SEED',
  'DRUM','BELL','HORN','HARP','FLUTE','LYRE','DOME','ARCH','TOWER','WALL',
  'GATE','BRIDGE','PIER','DOCK','PORT','SHIP','BOAT','RAFT','SAIL','OAR',
  'PATH','ROAD','LANE','FORD','PASS','PEAK','RIDGE','SLOPE','VALE','DELL',
  'IRON','ZINC','COAL','JADE','RUBY','OPAL','ONYX','PEAR','CORAL','AMBER'
];

// ─── DOM ────────────────────────────────────────────────────────
const tvView     = document.getElementById('tvView');
const phoneView  = document.getElementById('phoneView');
const roomWord   = document.getElementById('roomWord');
const tvStatus   = document.getElementById('tvStatus');
const codeInput  = document.getElementById('codeInput');
const connectBtn = document.getElementById('connectBtn');
const shareBtn   = document.getElementById('shareBtn');
const stopBtn    = document.getElementById('stopBtn');
const phoneStatus = document.getElementById('phoneStatus');
const videoOverlay = document.getElementById('videoOverlay');
const remoteVideo  = document.getElementById('remoteVideo');

// ─── State ──────────────────────────────────────────────────────
let pc = null, localStream = null;
let mqtt = null;
let room = '';
let role = ''; // 'tv' or 'phone'

// ─── ICE servers ────────────────────────────────────────────────
const ice = { iceServers: [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' }
]};

// ─── Feature check ──────────────────────────────────────────────
function canShareScreen() {
  return !!(navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia);
}

// ─── Random room code ───────────────────────────────────────────
function randomRoom() {
  return WORDS[Math.floor(Math.random() * WORDS.length)];
}

// ─── MQTT connect ───────────────────────────────────────────────
function connectMQTT() {
  const clientId = 'mirror-' + Math.random().toString(36).slice(2, 10);
  mqtt = new Paho.MQTT.Client(MQTT_HOST, MQTT_PORT, MQTT_PATH, clientId);

  mqtt.onConnectionLost = () => {
    console.log('MQTT disconnected');
  };

  mqtt.onMessageArrived = (msg) => {
    try {
      const data = JSON.parse(msg.payloadString);
      handleSignal(data);
    } catch (e) {
      console.log('Bad message:', e);
    }
  };

  return new Promise((resolve, reject) => {
    mqtt.connect({
      onSuccess: () => {
        console.log('MQTT connected');
        resolve();
      },
      onFailure: (err) => {
        console.error('MQTT failed:', err);
        reject(new Error('Could not connect to signaling. Check your internet.'));
      },
      timeout: 10,
      keepAliveInterval: 30,
      useSSL: false
    });
  });
}

// ─── Subscribe to room topics ───────────────────────────────────
function subscribeRoom() {
  // TV subscribes to phone's messages; phone subscribes to TV's messages
  const topic = 'mirror/' + room + '/' + (role === 'tv' ? 'phone' : 'tv');
  mqtt.subscribe(topic);
}

// ─── Publish to room ────────────────────────────────────────────
function publishSignal(data) {
  const topic = 'mirror/' + room + '/' + role;
  mqtt.send(topic, JSON.stringify(data));
}

// ─── Handle incoming signal ─────────────────────────────────────
function handleSignal(data) {
  if (!pc) return;

  if (data.type === 'offer') {
    handleOffer(data);
  } else if (data.type === 'answer') {
    handleAnswer(data);
  } else if (data.type === 'ice') {
    handleIce(data);
  }
}

async function handleOffer(data) {
  try {
    await pc.setRemoteDescription({ type: 'offer', sdp: data.sdp });
    if (data.candidates) {
      for (const c of data.candidates) {
        if (c.candidate) {
          try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch {}
        }
      }
    }
    // Phone now shows "Share Screen" button
    connectBtn.classList.add('hidden');
    codeInput.classList.add('hidden');
    shareBtn.classList.remove('hidden');
    phoneStatus.textContent = 'Connected to TV. Tap Share Screen.';
    phoneStatus.className = 'phone-status ok';
  } catch (e) {
    phoneStatus.textContent = 'Connection error: ' + e.message;
    phoneStatus.className = 'phone-status error';
  }
}

async function handleAnswer(data) {
  try {
    await pc.setRemoteDescription({ type: 'answer', sdp: data.sdp });
    if (data.candidates) {
      for (const c of data.candidates) {
        if (c.candidate) {
          try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch {}
        }
      }
    }
  } catch (e) {
    console.error('Answer error:', e);
  }
}

async function handleIce(data) {
  if (data.candidate) {
    try {
      await pc.addIceCandidate(new RTCIceCandidate(data));
    } catch (e) {
      console.log('ICE add failed:', e.message);
    }
  }
}

// ════════════════════════════════════════════════════════════════
//  TV (RECEIVER)
// ════════════════════════════════════════════════════════════════
async function runTV() {
  role = 'tv';
  tvView.classList.remove('hidden');
  phoneView.classList.add('hidden');

  room = randomRoom();
  roomWord.textContent = room;
  tvStatus.textContent = 'Setting up...';
  tvStatus.className = 'tv-status';

  try {
    await connectMQTT();
    subscribeRoom();

    pc = new RTCPeerConnection(ice);
    const tvCandidates = [];

    pc.onicecandidate = e => {
      if (e.candidate) {
        tvCandidates.push(e.candidate);
        publishSignal({ type: 'ice', candidate: e.candidate.candidate,
          sdpMid: e.candidate.sdpMid, sdpMLineIndex: e.candidate.sdpMLineIndex });
      }
    };

    pc.ontrack = event => {
      remoteVideo.srcObject = event.streams[0];
      videoOverlay.style.display = 'block';
      tvStatus.textContent = 'Connected! Showing screen.';
      tvStatus.className = 'tv-status connected';
    };

    pc.oniceconnectionstatechange = () => {
      const s = pc.iceConnectionState;
      if (s === 'connected' || s === 'completed') {
        tvStatus.textContent = 'Connected!';
        tvStatus.className = 'tv-status connected';
      } else if (s === 'disconnected' || s === 'failed') {
        tvStatus.textContent = 'Lost connection — refresh page';
        tvStatus.className = 'tv-status error';
        videoOverlay.style.display = 'none';
      }
    };

    // Create data channel (helps with connection)
    pc.createDataChannel('mirror');

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    // Let ICE gather for 2 seconds then send offer
    await new Promise(r => setTimeout(r, 2000));

    publishSignal({
      type: 'offer',
      sdp: offer.sdp,
      candidates: tvCandidates.map(c => ({
        candidate: c.candidate, sdpMid: c.sdpMid, sdpMLineIndex: c.sdpMLineIndex
      }))
    });

    tvStatus.textContent = 'Waiting for iPhone to connect...';

    // Auto-refresh if no connection after 2 min
    setTimeout(() => {
      if (pc && pc.iceConnectionState === 'new') {
        tvStatus.textContent = 'Timed out — refreshing...';
        setTimeout(() => {
          mqtt.disconnect();
          runTV();
        }, 1000);
      }
    }, 120000);

  } catch (err) {
    tvStatus.textContent = 'Error: ' + err.message;
    tvStatus.className = 'tv-status error';
  }
}

// ════════════════════════════════════════════════════════════════
//  PHONE (SHARER)
// ════════════════════════════════════════════════════════════════
function runPhone() {
  role = 'phone';
  phoneView.classList.remove('hidden');
  tvView.classList.add('hidden');

  // Check browser support
  if (!canShareScreen()) {
    phoneStatus.textContent = 'This browser does not support screen sharing.';
    phoneStatus.className = 'phone-status error';
    connectBtn.classList.add('hidden');
    codeInput.classList.add('hidden');

    const ua = navigator.userAgent;
    const isIOS = /iPhone|iPad|iPod/.test(ua);
    if (isIOS) {
      const iosVer = (/OS (\d+_\d+)/.exec(ua) || ['','?'])[1].replace('_','.');
      phoneView.insertAdjacentHTML('beforeend', `
        <div class="unsupported-box">
          <p><strong>iOS limitation:</strong></p>
          <p style="margin-top:8px;">Screen sharing requires <strong>iOS 16.4+</strong> (you have ${iosVer}) and must be opened in <strong>Safari</strong>.</p>
          <p style="margin-top:8px;">If you opened this from another app, copy the URL and paste it into Safari.</p>
        </div>`);
    }
    return;
  }

  connectBtn.addEventListener('click', async () => {
    const code = codeInput.value.trim().toUpperCase();
    if (code.length !== 4) {
      phoneStatus.textContent = 'Enter the 4-letter code from your TV';
      phoneStatus.className = 'phone-status error';
      return;
    }
    room = code;
    connectBtn.disabled = true;
    connectBtn.textContent = 'Connecting...';
    phoneStatus.textContent = 'Connecting to TV...';
    phoneStatus.className = 'phone-status';

    try {
      await connectMQTT();
      subscribeRoom();

      pc = new RTCPeerConnection(ice);

      pc.onicecandidate = e => {
        if (e.candidate) {
          publishSignal({ type: 'ice', candidate: e.candidate.candidate,
            sdpMid: e.candidate.sdpMid, sdpMLineIndex: e.candidate.sdpMLineIndex });
        }
      };

      pc.oniceconnectionstatechange = () => {
        if (pc.iceConnectionState === 'failed') {
          phoneStatus.textContent = 'Connection lost';
          phoneStatus.className = 'phone-status error';
        }
      };

      connectBtn.textContent = 'Connected!';
      phoneStatus.textContent = 'Connected to TV. Tap Share Screen.';
      phoneStatus.className = 'phone-status ok';
      connectBtn.classList.add('hidden');
      codeInput.classList.add('hidden');
      shareBtn.classList.remove('hidden');

    } catch (err) {
      connectBtn.disabled = false;
      connectBtn.textContent = 'Connect to TV';
      phoneStatus.textContent = err.message;
      phoneStatus.className = 'phone-status error';
    }
  });

  shareBtn.addEventListener('click', async () => {
    shareBtn.disabled = true;
    shareBtn.textContent = 'Requesting permission...';
    phoneStatus.textContent = '';
    phoneStatus.className = 'phone-status';

    try {
      localStream = await navigator.mediaDevices.getDisplayMedia({
        video: { frameRate: { ideal: 15 } },
        audio: false
      });

      shareBtn.textContent = 'Connecting stream...';

      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);

      // Let ICE gather
      await new Promise(r => setTimeout(r, 1500));

      const phoneCandidates = [];
      // Collect any pending ICE candidates (they were already sent via onicecandidate)
      // We rely on trickle ICE here — candidates already sent via onicecandidate handler
      // Send the answer
      publishSignal({ type: 'answer', sdp: answer.sdp, candidates: [] });

      shareBtn.classList.add('hidden');
      stopBtn.classList.remove('hidden');
      phoneStatus.textContent = 'Sharing screen to TV';
      phoneStatus.className = 'phone-status ok';

      // Handle stop via system UI
      localStream.getVideoTracks()[0].onended = () => stopSharing(true);

    } catch (err) {
      shareBtn.disabled = false;
      shareBtn.textContent = 'Share Screen';
      if (err.name === 'NotAllowedError') {
        phoneStatus.textContent = 'Permission denied — try again';
      } else if (err.name === 'AbortError') {
        phoneStatus.textContent = 'Cancelled';
      } else {
        phoneStatus.textContent = 'Error: ' + err.message;
      }
      phoneStatus.className = 'phone-status error';
    }
  });

  stopBtn.addEventListener('click', () => stopSharing(false));
}

function stopSharing(systemStop) {
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  if (pc) { pc.close(); pc = null; }
  if (mqtt) {
    try { mqtt.disconnect(); } catch {}
    mqtt = null;
  }
  stopBtn.classList.add('hidden');
  shareBtn.classList.remove('hidden');
  shareBtn.textContent = 'Share Screen';
  shareBtn.disabled = false;
  phoneStatus.textContent = systemStop ? 'Sharing stopped by system' : 'Stopped';
  phoneStatus.className = 'phone-status';
}

// ════════════════════════════════════════════════════════════════
//  GO — detect role from URL
// ════════════════════════════════════════════════════════════════
const params = new URLSearchParams(window.location.search);
if (params.get('room')) {
  // Phone with pre-filled room code
  runPhone();
  codeInput.value = params.get('room').toUpperCase();
} else {
  // TV by default
  runTV();
}
</script>
</body>
</html>
