<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Screen Mirror</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #111;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  h1 { font-size: 1.6rem; margin-bottom: 6px; }
  .sub { color: #999; margin-bottom: 24px; font-size: 0.85rem; }
  .card {
    background: #1a1a2e;
    border-radius: 16px;
    padding: 28px 24px;
    max-width: 420px;
    width: 100%;
    text-align: center;
  }
  .btn {
    display: block;
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 12px;
    transition: opacity 0.2s;
  }
  .btn:active { opacity: 0.7; }
  .btn-share { background: #4f46e5; color: #fff; }
  .btn-receive { background: #059669; color: #fff; }
  .btn-stop { background: #dc2626; color: #fff; }
  .btn-copy { background: #333; color: #eee; font-size: 0.9rem; padding: 10px; }
  .code-box {
    background: #0f0f1a;
    border-radius: 10px;
    padding: 14px;
    margin: 16px 0;
    font-family: 'Courier New', monospace;
    font-size: 1.1rem;
    word-break: break-all;
    user-select: all;
    border: 1px solid #333;
  }
  textarea.code-box {
    width: 100%;
    min-height: 80px;
    resize: vertical;
    color: #eee;
    outline: none;
  }
  textarea.code-box:focus { border-color: #4f46e5; }
  .status { margin: 12px 0; font-size: 0.9rem; color: #bbb; }
  .status.connected { color: #4ade80; }
  .status.error { color: #f87171; }
  .video-container {
    width: 100%;
    max-width: 640px;
    margin-top: 20px;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
    display: none;
  }
  .video-container video {
    width: 100%;
    display: block;
  }
  .step-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #666;
    margin-bottom: 4px;
  }
  hr { border: none; border-top: 1px solid #333; margin: 20px 0; }
  .mode-select {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .mode-select .btn { flex: 1; margin: 0; opacity: 0.5; }
  .mode-select .btn.active { opacity: 1; }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="card" id="modeScreen">
  <h1>📱 Screen Mirror</h1>
  <p class="sub">Peer-to-peer over your local network</p>

  <div class="mode-select">
    <button class="btn btn-share active" id="modeShareBtn">📤 Share</button>
    <button class="btn btn-receive" id="modeReceiveBtn">📥 Receive</button>
  </div>

  <!-- SHARE MODE -->
  <div id="sharePanel">
    <p class="step-label">Step 1 — Get the receiver's code</p>
    <p style="font-size:0.85rem;color:#999;margin-bottom:12px;">
      On your TV, tap <strong>Receive</strong> and enter the code shown there.
    </p>
    <textarea class="code-box" id="remoteCode" placeholder="Paste the receiver's connection code here..."></textarea>
    <button class="btn btn-share" id="startShareBtn">📤 Share Screen</button>
    <div class="status" id="shareStatus">Enter the receiver's code and tap Share Screen</div>
  </div>

  <!-- RECEIVE MODE -->
  <div id="receivePanel" class="hidden">
    <p class="step-label">Your connection code</p>
    <div class="code-box" id="myCode">Generating...</div>
    <button class="btn btn-copy" id="copyCodeBtn">📋 Copy Code</button>
    <div class="status" id="receiveStatus">Waiting for someone to connect...</div>
    <button class="btn btn-stop hidden" id="stopReceiveBtn">⏹ Stop</button>
  </div>
</div>

<div class="video-container" id="videoContainer">
  <video id="remoteVideo" autoplay playsinline></video>
</div>

<script>
// ───  ICE / STUN servers ─────────────────────────────────────────
const iceServers = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' }
  ]
};

// ───  DOM refs ───────────────────────────────────────────────────
const modeScreen       = document.getElementById('modeScreen');
const modeShareBtn     = document.getElementById('modeShareBtn');
const modeReceiveBtn   = document.getElementById('modeReceiveBtn');
const sharePanel       = document.getElementById('sharePanel');
const receivePanel     = document.getElementById('receivePanel');
const remoteCode       = document.getElementById('remoteCode');
const startShareBtn    = document.getElementById('startShareBtn');
const shareStatus      = document.getElementById('shareStatus');
const myCodeDiv        = document.getElementById('myCode');
const copyCodeBtn      = document.getElementById('copyCodeBtn');
const receiveStatus    = document.getElementById('receiveStatus');
const stopReceiveBtn   = document.getElementById('stopReceiveBtn');
const videoContainer   = document.getElementById('videoContainer');
const remoteVideo      = document.getElementById('remoteVideo');

let pc = null;           // RTCPeerConnection
let localStream = null;  // screen capture stream
let mode = 'share';      // 'share' | 'receive'
let makingOffer = false;

// ───  Mode switching ─────────────────────────────────────────────
modeShareBtn.addEventListener('click', () => {
  mode = 'share';
  modeShareBtn.classList.add('active');
  modeReceiveBtn.classList.remove('active');
  sharePanel.classList.remove('hidden');
  receivePanel.classList.add('hidden');
  resetConnection();
});

modeReceiveBtn.addEventListener('click', () => {
  mode = 'receive';
  modeReceiveBtn.classList.add('active');
  modeShareBtn.classList.remove('active');
  receivePanel.classList.remove('hidden');
  sharePanel.classList.add('hidden');
  resetConnection();
  startReceiver();
});

// ───  Reset ──────────────────────────────────────────────────────
function resetConnection() {
  if (pc) { pc.close(); pc = null; }
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  videoContainer.style.display = 'none';
  shareStatus.textContent = '';
  shareStatus.className = 'status';
  receiveStatus.textContent = '';
  receiveStatus.className = 'status';
  stopReceiveBtn.classList.add('hidden');
  remoteCode.value = '';
}

// ───  Generate a random ID ──────────────────────────────────────
function randomId() {
  const a = new Uint8Array(16);
  crypto.getRandomValues(a);
  return btoa(String.fromCharCode(...a)).replace(/[/+=]/g, '').slice(0, 12);
}

// ───  Encode / decode SDP + ICE for manual signaling ────────────
// Format: base64(json({type, sdp, candidates: [...]}))
function encodeConnectionData(offer, candidates) {
  const data = {
    type: offer.type,
    sdp: offer.sdp,
    candidates: candidates.map(c => ({
      candidate: c.candidate,
      sdpMid: c.sdpMid,
      sdpMLineIndex: c.sdpMLineIndex
    }))
  };
  return btoa(JSON.stringify(data));
}

function decodeConnectionData(str) {
  try {
    return JSON.parse(atob(str));
  } catch {
    return null;
  }
}

// ───  RECEIVER ──────────────────────────────────────────────────
let receiverCandidates = [];

async function startReceiver() {
  resetConnection();
  myCodeDiv.textContent = 'Creating connection...';

  pc = new RTCPeerConnection(iceServers);
  receiverCandidates = [];

  // Collect ICE candidates as they arrive
  pc.onicecandidate = (e) => {
    if (e.candidate) {
      receiverCandidates.push(e.candidate);
    }
  };

  pc.ontrack = (event) => {
    console.log('Track received!');
    remoteVideo.srcObject = event.streams[0];
    videoContainer.style.display = 'block';
    receiveStatus.textContent = '✅ Connected — receiving stream!';
    receiveStatus.className = 'status connected';
    stopReceiveBtn.classList.remove('hidden');
  };

  pc.oniceconnectionstatechange = () => {
    console.log('ICE state:', pc.iceConnectionState);
    if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
      receiveStatus.textContent = '⚠ Connection lost. Tap Receive again.';
      receiveStatus.className = 'status error';
      stopReceiveBtn.classList.add('hidden');
    }
  };

  try {
    // Create a data channel (required to make the offer valid for screen sharing)
    pc.createDataChannel('screen-mirror');
    const offer = await pc.createOffer();
    makingOffer = true;
    await pc.setLocalDescription(offer);
    makingOffer = false;

    // Wait a moment for ICE candidates to gather
    await new Promise(r => setTimeout(r, 1500));

    myCodeDiv.textContent = encodeConnectionData(offer, receiverCandidates);
    receiveStatus.textContent = '📋 Copy this code and send it to the sharer';
  } catch (err) {
    receiveStatus.textContent = 'Error: ' + err.message;
    receiveStatus.className = 'status error';
    myCodeDiv.textContent = 'Error';
  }
}

// ───  SHARER ─────────────────────────────────────────────────────
startShareBtn.addEventListener('click', async () => {
  const code = remoteCode.value.trim();
  if (!code) {
    shareStatus.textContent = 'Paste the receiver\'s connection code first';
    shareStatus.className = 'status error';
    return;
  }

  const data = decodeConnectionData(code);
  if (!data) {
    shareStatus.textContent = 'Invalid connection code. Make sure you copied it fully.';
    shareStatus.className = 'status error';
    return;
  }

  shareStatus.textContent = '⏳ Requesting screen share...';
  shareStatus.className = 'status';

  try {
    // Request screen capture
    localStream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: { ideal: 15 } },
      audio: false
    });

    // If user cancels screen picker
    if (!localStream) {
      shareStatus.textContent = 'Screen share was cancelled';
      shareStatus.className = 'status error';
      return;
    }

    shareStatus.textContent = '⏳ Connecting to receiver...';

    pc = new RTCPeerConnection(iceServers);

    // Add screen track
    localStream.getTracks().forEach(track => {
      pc.addTrack(track, localStream);
    });

    // Handle ICE candidates from receiver
    if (data.candidates && data.candidates.length > 0) {
      for (const c of data.candidates) {
        if (c.candidate) {
          try {
            await pc.addIceCandidate(new RTCIceCandidate(c));
          } catch (e) {
            console.log('Ignored ICE candidate:', e.message);
          }
        }
      }
    }

    // Set remote description
    await pc.setRemoteDescription({ type: data.type, sdp: data.sdp });

    // Create answer
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    // Generate answer code for the receiver
    let answerCandidates = [];
    pc.onicecandidate = (e) => {
      if (e.candidate) {
        answerCandidates.push(e.candidate);
      }
    };

    // Wait for some candidates
    await new Promise(r => setTimeout(r, 1500));

    const answerData = encodeConnectionData(answer, answerCandidates);
    // Update the remote code box with the answer
    remoteCode.value = answerData;

    shareStatus.textContent = '✅ Connected! Screen is being shared.';
    shareStatus.className = 'status connected';

    // Show stop button
    startShareBtn.textContent = '⏹ Stop Sharing';
    startShareBtn.classList.remove('btn-share');
    startShareBtn.classList.add('btn-stop');
    startShareBtn.removeEventListener('click', arguments.callee);
    startShareBtn.addEventListener('click', stopSharing);

    // When user stops screen capture via browser UI
    localStream.getVideoTracks()[0].onended = () => {
      stopSharing();
    };

    pc.oniceconnectionstatechange = () => {
      if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
        shareStatus.textContent = '⚠ Connection lost';
        shareStatus.className = 'status error';
      }
    };

  } catch (err) {
    shareStatus.textContent = 'Error: ' + err.message;
    shareStatus.className = 'status error';
    console.error(err);
  }
});

function stopSharing() {
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  if (pc) { pc.close(); pc = null; }
  startShareBtn.textContent = '📤 Share Screen';
  startShareBtn.classList.remove('btn-stop');
  startShareBtn.classList.add('btn-share');
  shareStatus.textContent = 'Sharing stopped';
  shareStatus.className = 'status';
  videoContainer.style.display = 'none';
  remoteCode.value = '';
}

// ───  Copy code button ──────────────────────────────────────────
copyCodeBtn.addEventListener('click', async () => {
  const text = myCodeDiv.textContent;
  if (!text || text === 'Generating...' || text === 'Error' || text === 'Creating connection...') return;
  try {
    await navigator.clipboard.writeText(text);
    copyCodeBtn.textContent = '✅ Copied!';
    setTimeout(() => { copyCodeBtn.textContent = '📋 Copy Code'; }, 2000);
  } catch {
    // Fallback: select text
    const range = document.createRange();
    range.selectNodeContents(myCodeDiv);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    copyCodeBtn.textContent = '📋 Select All (copy manually)';
    setTimeout(() => { copyCodeBtn.textContent = '📋 Copy Code'; }, 2000);
  }
});

// ───  Stop receiving ────────────────────────────────────────────
stopReceiveBtn.addEventListener('click', () => {
  resetConnection();
  startReceiver();
});

// ───  Start in receive mode initially ──────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Start in receive mode by default
  startReceiver();
});

console.log('Screen Mirror ready. Use Share on your phone, Receive on your TV.');
</script>
</body>
</html>
